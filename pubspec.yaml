name: compressor_app
description: A file compression Flutter application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # File Picking
  file_picker: ^8.1.4
  
  # HTTP Requests
  http: ^1.2.2
  dio: ^5.7.0
  
  # Path Management
  path_provider: ^2.1.5
  
  # Permissions
  permission_handler: ^11.3.1
  
  # State Management
  provider: ^6.1.2
  
  # Image Preview
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true